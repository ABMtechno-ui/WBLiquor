</head><body>

</div></header>

<div class="auth-wrap">
  <div class="auth-card">
    <h2>Create your account</h2>
    <p class="sub">Start your membership application in minutes.</p>
    <form class="form" id="registerForm" novalidate>
      <div class="field"><label for="regName">Full name</label><input class="input" id="regName" name="name" autocomplete="name" placeholder="Your full name" required/></div>
      <div class="field"><label for="regEmail">Email address</label><input class="input" id="regEmail" type="email" name="email" autocomplete="email" placeholder="you@company.com" required/></div>
      <div class="field"><label for="regPassword">Password</label><input class="input" id="regPassword" type="password" name="password" autocomplete="new-password" minlength="8" placeholder="Minimum 8 characters" required/></div>
      <div class="field"><label for="regConfirm">Confirm password</label><input class="input" id="regConfirm" type="password" name="confirm" autocomplete="new-password" minlength="8" placeholder="Re-enter password" required/></div>
      <label class="checkbox"><input type="checkbox" required/> I agree to the <a href="about.html">association terms and rules</a>.</label>
      <button class="btn btn-primary btn-block" type="submit">Create account</button>
    </form>
    <p class="auth-alt">Already have an account? <a href="login.html">Sign in</a></p>
  </div>
</div>
<script src="assets/js/app.js"></script>
<script src="assets/js/navigation.js"></script>

</body></html>
